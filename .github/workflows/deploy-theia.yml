# ==============================================================================
# Reusable Workflow: Deploy Theia Cloud
# ==============================================================================
# This is the core deployment workflow that handles the actual Helm installation
# of Theia Cloud to any environment. It's designed to be reusable and is called
# by other workflows (deploy-pr.yml, deploy-staging.yml, deploy-production.yml).
#
# Purpose:
#   - Install/upgrade Theia Cloud Helm charts to a specific Kubernetes namespace
#   - Handle environment-specific configuration via Helm values
#   - Manage secrets for certificates and Keycloak authentication
#
# Usage:
#   This workflow should not be triggered directly. It's called by other workflows
#   using the workflow_call trigger.
#
# Required Secrets (configured per GitHub Environment):
#   - KUBECONFIG: Kubernetes cluster configuration
#   - THEIA_WILDCARD_CERTIFICATE_CERT: SSL certificate (base64 encoded)
#   - THEIA_WILDCARD_CERTIFICATE_KEY: SSL certificate key (base64 encoded)
#   - THEIA_KEYCLOAK_COOKIE_SECRET: OAuth2 proxy cookie secret
#   - THEIA_KEYCLOAK_REALM: Keycloak realm name
#   - THEIA_KEYCLOAK_CLIENT_ID: Keycloak client ID
#   - THEIA_KEYCLOAK_CLIENT_SECRET: Keycloak client secret
#   - THEIA_ADMIN_API_TOKEN: Admin bearer token for admin API token protected service endpoints
#
# Parameters:
#   - environment: GitHub environment name (e.g., prod, staging, test1)
#
# Required Environment Variables (configured per GitHub Environment):
#   - NAMESPACE: Target Kubernetes namespace
#   - HELM_VALUES_PATH: Path to environment-specific Helm values directory
# Optional workflow inputs:
#   - deploy_shared_gateway: Deploy shared gateway in this job
#   - shared_gateway_values_file: Values file path for shared gateway chart
#   - shared_gateway_namespace: Namespace for shared gateway release (default: gateway-system)
# ==============================================================================

name: Deploy Theia Cloud

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (e.g., prod, staging, test1)"
        required: true
        type: string
      theia_cloud_tag:
        description: "Image tag for Theia Cloud components (operator, service, landing-page). Leave empty to use the tag defined in values.yaml (no override)."
        required: false
        type: string
        default: ""
      ide_images_tag:
        description: "Image tag for IDE images (appdefinitions and preloading). Leave empty to use the tag defined in values.yaml (no override)."
        required: false
        type: string
        default: ""
      helm_chart_tag:
        description: "Published OCI preview tag to use for upstream helm charts (e.g. pr-123)"
        required: false
        type: string
        default: ""
      deploy_shared_gateway:
        description: "Whether to deploy the shared gateway release"
        required: false
        type: boolean
        default: false
      shared_gateway_values_file:
        description: "Values file path for the shared gateway chart"
        required: false
        type: string
        default: ""
      shared_gateway_namespace:
        description: "Namespace to install shared gateway release"
        required: false
        type: string
        default: "gateway-system"

jobs:
  helm-install:
    name: Install Theia Cloud Helm Chart
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    # Link to GitHub Environment for secrets and protection rules
    environment: ${{ inputs.environment }}

    steps:
      # Step 1: Checkout the repository to access Helm charts and values
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Helm CLI (v3.14.0)
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      # Step 2.5: Install kubectl (not pre-installed on self-hosted runners)
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      # Step 3: Configure kubectl to connect to the target Kubernetes cluster
      # The KUBECONFIG secret contains the cluster connection configuration
      - name: Setup Kubeconfig
        run: |
          # Write kubeconfig from secret to file
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          chmod 600 kubeconfig

          # Verify connection to cluster
          kubectl config get-contexts
          kubectl get nodes

      - name: Patch Chart.yaml for OCI preview tag
        if: inputs.helm_chart_tag != ''
        run: |
          set -euo pipefail

          get_theia_cloud_version() {
            awk '
              $1 == "-" && $2 == "name:" && $3 == "theia-cloud" { in_dep=1; next }
              in_dep && $1 == "version:" { print $2; exit }
            ' ./charts/theia-cloud-combined/Chart.yaml
          }

          normalize_preview_version() {
            local base="$1"
            local tag="$2"
            printf '%s.%s' "$base" "$tag"
          }

          THEIA_CLOUD_VERSION="$(get_theia_cloud_version)"
          PREVIEW_VERSION="$(normalize_preview_version "$THEIA_CLOUD_VERSION" "${{ inputs.helm_chart_tag }}")"
          sed -i "/name: theia-cloud/{n;s|version: .*|version: ${PREVIEW_VERSION}|;}" ./charts/theia-cloud-combined/Chart.yaml

          echo "Using OCI preview version: ${PREVIEW_VERSION}"
          cat ./charts/theia-cloud-combined/Chart.yaml

      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Step 4: Install Theia Cloud base components, CRDs, and cluster-wide monitoring
      # These are prerequisites from the upstream Theia Cloud Helm repository
      - name: Setup Helm dependencies
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          # Update dependencies for our custom chart
          helm dependency update ./charts/theia-cloud-combined
      - name: Install Theia Cloud base and CRDs
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          set -euo pipefail

          THEIA_CLOUD_BASE_VERSION="1.4.0-next.0"
          THEIA_CLOUD_CRDS_VERSION="1.2.0-next.1"

          if [ -n "${{ inputs.helm_chart_tag }}" ]; then
            normalize_preview_version() {
              local base="$1"
              local tag="$2"
              printf '%s.%s' "$base" "$tag"
            }

            THEIA_CLOUD_BASE_VERSION="$(normalize_preview_version "$THEIA_CLOUD_BASE_VERSION" "${{ inputs.helm_chart_tag }}")"
            THEIA_CLOUD_CRDS_VERSION="$(normalize_preview_version "$THEIA_CLOUD_CRDS_VERSION" "${{ inputs.helm_chart_tag }}")"
          fi
          THEIA_CLOUD_BASE_CHART=oci://ghcr.io/eduide/charts/theia-cloud-base
          THEIA_CLOUD_CRDS_CHART=oci://ghcr.io/eduide/charts/theia-cloud-crds

          # Install base components (operator base, metrics, etc.)
          helm upgrade theia-cloud-base "$THEIA_CLOUD_BASE_CHART" --version "$THEIA_CLOUD_BASE_VERSION" --install -n default -f ${{ vars.HELM_VALUES_PATH }}/theia-base-helm-values.yml

          # Install Custom Resource Definitions (CRDs) for Theia Cloud
          helm upgrade theia-cloud-crds "$THEIA_CLOUD_CRDS_CHART" --version "$THEIA_CLOUD_CRDS_VERSION" --install -n default -f ${{ vars.HELM_VALUES_PATH }}/theia-crds-helm-values.yml

      - name: Install cluster-wide monitoring
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |

          # Install cluster-wide monitoring (PodMonitors + Grafana Dashboards)
          # This is installed once per cluster, not per environment
          helm upgrade theia-monitoring ./charts/theia-monitoring --install -n default

      # Step 5: Install shared Gateway (optional, cluster-level)
      - name: Install Shared Gateway (optional)
        if: inputs.deploy_shared_gateway && inputs.shared_gateway_values_file != ''
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
          SHARED_GATEWAY_VALUES_FILE: ${{ inputs.shared_gateway_values_file }}
          SHARED_GATEWAY_NAMESPACE: ${{ inputs.shared_gateway_namespace }}
        run: |
          set -euo pipefail

          SHARED_GATEWAY_NAMESPACE="${SHARED_GATEWAY_NAMESPACE:-gateway-system}"
          echo "${{ secrets.THEIA_WILDCARD_CERTIFICATE_CERT }}" | base64 -w 0 > shared-gateway-wildcard.crt
          echo "${{ secrets.THEIA_WILDCARD_CERTIFICATE_KEY }}" | base64 -w 0 > shared-gateway-wildcard.key

          helm upgrade --install theia-shared-gateway ./charts/theia-shared-gateway \
            --namespace "$SHARED_GATEWAY_NAMESPACE" \
            --create-namespace \
            -f "$SHARED_GATEWAY_VALUES_FILE" \
            --set wildcardTLSSecret.certificate="$(cat shared-gateway-wildcard.crt)" \
            --set wildcardTLSSecret.key="$(cat shared-gateway-wildcard.key)"

      # Step 6: Install the main Theia Cloud application with environment-specific configuration
      # This includes the operator, service, certificates, and app definitions
      - name: Install Theia Cloud in namespace ${{ vars.NAMESPACE }}
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          set -euo pipefail

          # Prepare SSL certificates for ingress
          # Note: Secrets are already base64 encoded, but we need to write them to files
          echo "${{ secrets.THEIA_WILDCARD_CERTIFICATE_CERT }}" | base64 -w 0 > wildcard.crt
          echo "${{ secrets.THEIA_WILDCARD_CERTIFICATE_KEY }}" | base64 -w 0 > wildcard.key
          ADMIN_API_TOKEN_B64="$(printf '%s' "${{ secrets.THEIA_ADMIN_API_TOKEN }}" | base64 -w 0)"

          # Define image tag variables for cleaner command
          THEIA_CLOUD_TAG="${{ inputs.theia_cloud_tag }}"
          IDE_IMAGES_TAG="${{ inputs.ide_images_tag }}"

          # Build base helm command with always-present flags
          HELM_CMD=(helm upgrade --install theia-cloud-combined ./charts/theia-cloud-combined
            --namespace ${{ vars.NAMESPACE }}
            --create-namespace
            -f ${{ vars.HELM_VALUES_PATH }}/values.yaml
            --set-string theia-certificates.adminApiToken="${ADMIN_API_TOKEN_B64}"
            --set theia-certificates.wildcardCertificate="$(cat wildcard.crt)"
            --set theia-certificates.wildcardKey="$(cat wildcard.key)"
            --set theia-cloud.keycloak.cookieSecret="${{ secrets.THEIA_KEYCLOAK_COOKIE_SECRET }}")

          # Only override Theia Cloud component images when a tag is explicitly provided
          if [ -n "${THEIA_CLOUD_TAG}" ]; then
            HELM_CMD+=(
              --set theia-cloud.landingPage.image="ghcr.io/eduide/eduide-cloud/landing-page:${THEIA_CLOUD_TAG}"
              --set theia-cloud.operator.image="ghcr.io/eduide/eduide-cloud/operator:${THEIA_CLOUD_TAG}"
              --set theia-cloud.service.image="ghcr.io/eduide/eduide-cloud/service:${THEIA_CLOUD_TAG}"
              --set "theia-cloud.preloading.images[0]=ghcr.io/eduide/eduide-cloud/landing-page:${THEIA_CLOUD_TAG}"
            )
          fi

          # Only override IDE images when a tag is explicitly provided
          if [ -n "${IDE_IMAGES_TAG}" ]; then
            HELM_CMD+=(
              --set "theia-cloud.preloading.images[1]=ghcr.io/eduide/eduide/java-17:${IDE_IMAGES_TAG}"
              --set "theia-cloud.preloading.images[2]=ghcr.io/eduide/eduide/c:${IDE_IMAGES_TAG}"
              --set "theia-cloud.preloading.images[3]=ghcr.io/eduide/eduide/javascript:${IDE_IMAGES_TAG}"
              --set "theia-cloud.preloading.images[4]=ghcr.io/eduide/eduide/ocaml:${IDE_IMAGES_TAG}"
              --set "theia-cloud.preloading.images[5]=ghcr.io/eduide/eduide/rust:${IDE_IMAGES_TAG}"
              --set "theia-cloud.preloading.images[6]=ghcr.io/eduide/eduide/python:${IDE_IMAGES_TAG}"
              --set "theia-cloud.preloading.images[7]=ghcr.io/eduide/eduide/java-17-no-ls:${IDE_IMAGES_TAG}"
              --set "theia-cloud.preloading.images[8]=ghcr.io/eduide/eduide/rust-no-ls:${IDE_IMAGES_TAG}"
              --set "theia-cloud.preloading.images[9]=ghcr.io/eduide/eduide/langserver-java:${IDE_IMAGES_TAG}"
              --set "theia-cloud.preloading.images[10]=ghcr.io/eduide/eduide/langserver-rust:${IDE_IMAGES_TAG}"
              --set theia-appdefinitions.defaultImageTag="${IDE_IMAGES_TAG}"
            )
          fi

          # Install/upgrade the Helm chart with all configuration
          # --install: Create if it doesn't exist, upgrade if it does
          # --create-namespace: Create the namespace if it doesn't exist
          # Image tag overrides are applied only when non-empty; otherwise values.yaml settings are preserved
          "${HELM_CMD[@]}"
