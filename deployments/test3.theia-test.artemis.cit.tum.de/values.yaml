hosts:
  configuration:
    &hostsConfig # This is a YAML anchor for reusability and readability
    baseHost: theia-test.artemis.cit.tum.de
    service: service.test3
    landing: test3
    instance: instance.test3

theia-certificates:
  hosts:
    configuration: *hostsConfig

theia-cloud:
  app:
    id: nJV3nKZmpxTD4wu2
    name: Artemis Online IDE (Test3)

  issuer:
    email: ls1.itg@in.tum.de

  hosts:
    configuration: *hostsConfig
    allWildcardInstances: ["*.webview."]

  gateway:
    enabled: true
    create: false
    routes:
      enabled: true
    className: envoy
    name: theia-cloud-gateway
    parentRefs:
      - name: theia-shared-gateway
        namespace: gateway-system
    instancesRouteName: "theia-cloud-demo-ws-route"
    instancesWildcardSecretNames: { "*.webview.": static-theia-cert }
    serviceRouteRequestTimeout: "60s"

  monitor:
    enable: true
    activityTracker:
      enable: true
      interval: 3

  operator:
    image: ghcr.io/eduide/eduide-cloud/operator:pr-70
    sentry:
      enable: true
    #eagerStart: false
    replicas: 1
    sessionsPerUser: 10
    # Test3 runs on the parma cluster where Longhorn is the default storage backend.
    storageClassName: longhorn
    resources:
      requests:
        ephemeral-storage: "128Mi"
      limits:
        ephemeral-storage: "256Mi"

  service:
    image: ghcr.io/eduide/eduide-cloud/service:pr-70
    sentry:
      enable: true
    adminApiTokenSecret:
      name: service-admin-api-token
      key: ADMIN_API_TOKEN

  # Preload list indices 0–10 must match deploy-theia.yml --set overrides when tags are passed.
  # Index 11 is oauth2-proxy (distroless); the workflow does not override it.
  preloading:
    images:
      - ghcr.io/eduide/eduidec-landing-page:latest
      - ghcr.io/eduide/eduide/java-17:latest
      - ghcr.io/eduide/eduide/c:latest
      - ghcr.io/eduide/eduide/javascript:latest
      - ghcr.io/eduide/eduide/ocaml:latest
      - ghcr.io/eduide/eduide/rust:latest
      - ghcr.io/eduide/eduide/python:latest
      - ghcr.io/eduide/eduide/java-17-no-ls:pr-70
      - ghcr.io/eduide/eduide/rust-no-ls:pr-70
      - ghcr.io/eduide/eduide/langserver-java:pr-70
      - ghcr.io/eduide/eduide/langserver-rust:pr-70
      - image: quay.io/oauth2-proxy/oauth2-proxy:v7.12.0
        args: ["--version"]

  imagePullPolicy: Always

  # Do not install demoApplication
  demoApplication:
    install: false

  landingPage:
    # We use the try now page as landing page since the default does not support mutliple apps -> https://github.com/eclipsesource/theia-cloud/discussions/301
    image: ghcr.io/eduide/eduidec-landing-page:latest
    sentry:
      enable: true
    # We can define a default blueprint
    
    # 1. The actual image data (Must be a Base64 encoded string)
    # You can get this by running: cat my-logo.png | base64 | pbcopy
    #logoData: "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+P+/HgAFhAJ/wlseKgAAAABJRU5ErkJggg=="
    
    # 2. (Optional) If you removed the 'hardcoded png' logic in the template, 
    # you might need this. If you used my simplified template, this is ignored.
    logoFileExtension: "png"
    appDefinition: "java-17-templates-latest"
    ephemeralStorage: true
    additionalApps:
      java-17-templates-latest:
        label: Java 17
        buildSystems:
          - id: maven
            label: Maven
          - id: gradle
            label: Gradle
      java-17-no-ls:
        label: Java 17 No-LS
        image: "java-17"
      rust-no-ls:
        label: Rust No-LS
        image: "rust"
    infoTitle: "🚀 Welcome to EduIDE Cloud (Test3)"
    infoText: " "
    loadingText: "⚡ Setting up your development workspace..."
    footerLinks:
      attribution:
        text: "Built by TUM AET Research Group 👨‍💻"
        url: "https://aet.cit.tum.de/"
        version: "Test3-v1.0.0"
      bugReport:
        text: "Report a bug 🐛"
        url: "https://github.com/EduIDE/EduIDE/issues"
      featureRequest:
        text: "Request a feature ✨"
        url: "https://github.com/EduIDE/EduIDE/issues"
      about:
        text: "About"
        url: "https://aet.cit.tum.de/"

  keycloak:
    enable: true

    # -- Key cloak auth URL. Only has to be specified when enable: true
    authUrl: "https://keycloak.ase.in.tum.de/"

    # -- The Keycloak Realm. Only has to be specified when enable: true
    realm: "Test"

    # -- The client-id. Only has to be specified when enable: true
    clientId: "theia-test"

theia-appdefinitions:
  defaultImageTag: pr-70
  apps:
    - name: java-17-no-ls
      image: ghcr.io/eduide/eduide/java-17-no-ls
      minInstances: 1
      sidecars:
        - name: langserver
          image: ghcr.io/eduide/eduide/langserver-java
          port: 5000
          languages: [java]
          mountWorkspace: true
    - name: rust-no-ls
      image: ghcr.io/eduide/eduide/rust-no-ls
      minInstances: 1
      sidecars:
        - name: langserver
          image: ghcr.io/eduide/eduide/langserver-rust
          port: 5000
          languages: [rust]
          mountWorkspace: true

monitoring:
  targetNamespaces:
    - test3
  sessionNamespaces:
    - test3
