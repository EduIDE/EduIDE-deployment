hosts:
  configuration:
    &hostsConfig # This is a YAML anchor for reusability and readability
    baseHost: theia-test.artemis.cit.tum.de
    service: service.test3
    landing: test3
    instance: instance.test3

theia-certificates:
  hosts:
    configuration: *hostsConfig

theia-cloud:
  app:
    id: nJV3nKZmpxTD4wu2
    name: Artemis Online IDE (Test3)

  issuer:
    email: ls1.itg@in.tum.de

  hosts:
    configuration: *hostsConfig
    allWildcardInstances: ["*.webview."]

  ingress:
    #instanceName: "theia-cloud-ws-ingress"
    clusterIssuer: letsencrypt-prod
    certManagerAnnotations: false
    instances:
      allWildcardSecretNames: { "*.webview.": static-theia-cert }

  monitor:
    enable: true
    activityTracker:
      enable: true
      interval: 3

  operator:
    image: ghcr.io/ls1intum/theia/operator:pr-70
    #eagerStart: false
    replicas: 1
    sessionsPerUser: 10
    storageClassName: longhorn
    resources:
      requests:
        ephemeral-storage: "128Mi"
      limits:
        ephemeral-storage: "256Mi"

  service:
    image: ghcr.io/ls1intum/theia/service:pr-70

  preloading:
    images:
      - ghcr.io/ls1intum/theia/landing-page:latest
      - ghcr.io/ls1intum/theia/java-17:latest
      - ghcr.io/ls1intum/theia/rust:latest
      - ghcr.io/ls1intum/theia/theia-java-no-ls:pr-101
      - ghcr.io/ls1intum/theia/theia-rust-no-ls:pr-101
      - ghcr.io/ls1intum/theia/langserver-java:pr-98-e8d40ca
      - ghcr.io/ls1intum/theia/langserver-rust:pr-98-e8d40ca

  imagePullPolicy: Always

  # Do not install demoApplication
  demoApplication:
    install: false

  landingPage:
    # We use the try now page as landing page since the default does not support mutliple apps -> https://github.com/eclipsesource/theia-cloud/discussions/301
    image: ghcr.io/ls1intum/theia/landing-page
    # We can define a default blueprint
    
    # 1. The actual image data (Must be a Base64 encoded string)
    # You can get this by running: cat my-logo.png | base64 | pbcopy
    #logoData: "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+P+/HgAFhAJ/wlseKgAAAABJRU5ErkJggg=="
    
    # 2. (Optional) If you removed the 'hardcoded png' logic in the template, 
    # you might need this. If you used my simplified template, this is ignored.
    logoFileExtension: "png"
    appDefinition: "java-17-latest"
    ephemeralStorage: true
    additionalApps:
      java-17-latest:
        label: Java 17
      c-latest:
        label: C
      javascript-latest:
        label: Javascript
      ocaml-latest:
        label: Ocaml
      python-latest:
        label: Python
      rust-latest:
        label: Rust
      java-17-no-ls:
        label: Java 17 No LS
      rust-no-ls:
        label: Rust No LS
    infoTitle: "🚀 Welcome to Test3 IDE Environment"
    infoText: "Test environment for Theia with external language server architecture (PR #98). The IDE runs separately from the language server for improved performance and modularity."
    loadingText: "⚡ Setting up your development workspace..."
    footerLinks:
      attribution:
        text: "Built by TUM LS1 Team 👨‍💻"
        url: "https://aet.cit.tum.de/"
        version: "Test3-v1.0.0"
      bugReport:
        text: "Report a bug 🐛"
        url: "https://github.com/ls1intum/theia-cloud/issues"
      featureRequest:
        text: "Request a feature ✨"
        url: "https://github.com/ls1intum/theia-cloud/issues"
      about:
        text: "About"
        url: "https://aet.cit.tum.de/"

  keycloak:
    enable: true

    # -- Key cloak auth URL. Only has to be specified when enable: true
    authUrl: "https://keycloak.ase.in.tum.de/"

    # -- The Keycloak Realm. Only has to be specified when enable: true
    realm: "Test"

    # -- The client-id. Only has to be specified when enable: true
    clientId: "theia-test"

theia-appdefinitions:
  apps:
    - name: java-17-no-ls
      image: ghcr.io/ls1intum/theia/theia-java-no-ls
      imageTag: pr-101
      minInstances: 1
      options:
        langserver-image: ghcr.io/ls1intum/theia/langserver-java:pr-98-e8d40ca
    - name: rust-no-ls
      image: ghcr.io/ls1intum/theia/theia-rust-no-ls
      imageTag: pr-101
      minInstances: 1
      options:
        langserver-image: ghcr.io/ls1intum/theia/langserver-rust:pr-98-e8d40ca

monitoring:
  targetNamespaces:
    - test3
  sessionNamespaces:
    - test3
