hosts:
  configuration:
    &hostsConfig # This is a YAML anchor for reusability and readability
    baseHost: theia-test.artemis.cit.tum.de
    service: service.test3
    landing: test3
    instance: instance.test3

theia-certificates:
  hosts:
    configuration: *hostsConfig

theia-cloud:
  app:
    id: nJV3nKZmpxTD4wu2
    name: Artemis Online IDE (Test3)

  issuer:
    email: ls1.itg@in.tum.de

  hosts:
    configuration: *hostsConfig
    allWildcardInstances: ["*.webview."]

  gateway:
    enabled: true
    create: false
    routes:
      enabled: true
    className: envoy
    name: theia-cloud-gateway
    parentRefs:
      - name: theia-shared-gateway
        namespace: gateway-system
    instancesRouteName: "theia-cloud-demo-ws-route"
    instancesWildcardSecretNames: { "*.webview.": static-theia-cert }
    serviceRouteRequestTimeout: "60s"

  monitor:
    enable: true
    activityTracker:
      enable: true
      interval: 3

  operator:
    image: ghcr.io/eduide/eduide/operator:latest
    #eagerStart: false
    replicas: 1
    sessionsPerUser: 10
    storageClassName: csi-rbd-sc
    resources:
      requests:
        ephemeral-storage: "128Mi"
      limits:
        ephemeral-storage: "256Mi"

  # service:
  #   image: ghcr.io/eduide/eduide/service:latest
  #   adminApiTokenSecret:
  #     name: service-admin-api-token
  #     key: ADMIN_API_TOKEN

  preloading:
    images:
      - ghcr.io/eduide/eduide/landing-page:latest
      - ghcr.io/eduide/eduide/java-17:latest
      - ghcr.io/eduide/eduide/c:latest
      - ghcr.io/eduide/eduide/javascript:latest
      - ghcr.io/eduide/eduide/ocaml:latest
      - ghcr.io/eduide/eduide/rust:latest
      - ghcr.io/eduide/eduide/python:latest

  imagePullPolicy: Always

  # Do not install demoApplication
  demoApplication:
    install: false

  landingPage:
    # We use the try now page as landing page since the default does not support mutliple apps -> https://github.com/eclipsesource/theia-cloud/discussions/301
    image: ghcr.io/eduide/eduide/landing-page
    # We can define a default blueprint
    
    # 1. The actual image data (Must be a Base64 encoded string)
    # You can get this by running: cat my-logo.png | base64 | pbcopy
    #logoData: "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+P+/HgAFhAJ/wlseKgAAAABJRU5ErkJggg=="
    
    # 2. (Optional) If you removed the 'hardcoded png' logic in the template, 
    # you might need this. If you used my simplified template, this is ignored.
    logoFileExtension: "png"
    appDefinition: "java-17-latest"
    ephemeralStorage: true
    additionalApps:
      java-17-latest:
        label: Java 17
      c-latest:
        label: C
      javascript-latest:
        label: Javascript
      ocaml-latest:
        label: Ocaml
      python-latest:
        label: Python
      rust-latest:
        label: Rust
      java-17-no-ls:
        label: Java 17 No-LS (Sidecar)
      rust-no-ls:
        label: Rust No-LS (Sidecar)
    infoTitle: "🚀 Welcome to Test3 IDE Environment"
    infoText: "Test environment for Theia with external language server architecture (PR #70). The IDE runs separately from the language server for improved performance and modularity."
    loadingText: "⚡ Setting up your development workspace..."
    footerLinks:
      attribution:
        text: "Built by TUM LS1 Team 👨‍💻"
        url: "https://aet.cit.tum.de/"
        version: "Test3-v1.0.0"
      bugReport:
        text: "Report a bug 🐛"
        url: "https://github.com/ls1intum/theia-cloud/issues"
      featureRequest:
        text: "Request a feature ✨"
        url: "https://github.com/ls1intum/theia-cloud/issues"
      about:
        text: "About"
        url: "https://aet.cit.tum.de/"

  keycloak:
    enable: true

    # -- Key cloak auth URL. Only has to be specified when enable: true
    authUrl: "https://keycloak.ase.in.tum.de/"

    # -- The Keycloak Realm. Only has to be specified when enable: true
    realm: "Test"

    # -- The client-id. Only has to be specified when enable: true
    clientId: "theia-test"

theia-appdefinitions:
  apps:
    - name: java-17-no-ls
      image: ghcr.io/ls1intum/theia/java-17-no-ls
      imageTag: latest
      minInstances: 1
      sidecars:
        - name: langserver
          image: ghcr.io/ls1intum/theia/langserver-java:latest
          port: 5000
          languages: [java]
          mountWorkspace: true
    - name: rust-no-ls
      image: ghcr.io/ls1intum/theia/rust-no-ls
      imageTag: latest
      minInstances: 1
      sidecars:
        - name: langserver
          image: ghcr.io/ls1intum/theia/langserver-rust:latest
          port: 5000
          languages: [rust]
          mountWorkspace: true

monitoring:
  targetNamespaces:
    - test3
  sessionNamespaces:
    - test3
