hosts:
  configuration:
    &hostsConfig # This is a YAML anchor for reusability and readability
    baseHost: artemis.cit.tum.de
    service: service.theia
    landing: theia
    instance: instance.theia

theia-certificates:
  hosts:
    configuration: *hostsConfig

theia-cloud:
  app:
    id: nJV3nKZmpxTD4wu2
    name: Artemis Online IDE

  issuer:
    email: ls1.itg@in.tum.de

  hosts:
    configuration: *hostsConfig
    allWildcardInstances: ["*.webview."]

  gateway:
    enabled: true
    create: false
    routes:
      enabled: true
    className: envoy
    name: theia-cloud-gateway
    parentRefs:
      - name: theia-shared-gateway
        namespace: gateway-system
    instancesWildcardSecretNames: { "*.webview.": static-theia-cert }
    serviceRouteRequestTimeout: "60s"

  monitor:
    enable: true
    activityTracker:
      enable: true
      interval: 3

  operator:
    image: ghcr.io/eduide/eduide-cloud/operator:latest-ba732d8
    # Production keeps Ceph RBD and does not configure sidecars.
    # Disable eager-start so the operator stays on the workspace-backed RWO path
    # instead of creating prewarmed RWX PVCs that do not fit csi-rbd-sc.
    eagerStart: false
    replicas: 3
    sessionsPerUser: 10
    storageClassName: csi-rbd-sc

  service:
    image: ghcr.io/eduide/eduide-cloud/service:latest-ba732d8
    adminApiTokenSecret:
      name: service-admin-api-token
      key: ADMIN_API_TOKEN

  # Preload list indices 0–10 must match deploy-theia.yml --set overrides when tags are passed.
  # Index 11 is oauth2-proxy (distroless); the workflow does not override it.
  preloading:
    images:
      - ghcr.io/eduide/eduidec-landing-page:latest-2c6f8ac
      - ghcr.io/eduide/eduide/java-17:latest-0c8eec9
      - ghcr.io/eduide/eduide/c:latest-0c8eec9
      - ghcr.io/eduide/eduide/javascript:latest-0c8eec9
      - ghcr.io/eduide/eduide/ocaml:latest-0c8eec9
      - ghcr.io/eduide/eduide/rust:latest-0c8eec9
      - ghcr.io/eduide/eduide/python:latest-0c8eec9
      - ghcr.io/eduide/eduide/java-17-no-ls:latest-0c8eec9
      - ghcr.io/eduide/eduide/rust-no-ls:latest-0c8eec9
      - ghcr.io/eduide/eduide/langserver-java:latest-0c8eec9
      - ghcr.io/eduide/eduide/langserver-rust:latest-0c8eec9
      - image: quay.io/oauth2-proxy/oauth2-proxy:v7.12.0
        args: ["--version"]

  imagePullPolicy: Always

  # Do not install demoApplication
  demoApplication:
    install: false

  landingPage:
    # We use the try now page as landing page since the default does not support mutliple apps -> https://github.com/eclipsesource/theia-cloud/discussions/301
    image: ghcr.io/eduide/eduidec-landing-page:latest-2c6f8ac
    logoFileExtension: "png"
    # We can define a default blueprint
    appDefinition: "java-17-latest"
    ephemeralStorage: true
    additionalApps:
      java-17-latest:
        label: Java 17
      c-latest:
        label: C
      javascript-latest:
        label: Javascript
      ocaml-latest:
        label: Ocaml
      python-latest:
        label: Python
      rust-latest:
        label: Rust
    infoTitle: "Welcome to Theia - your tailor-made online IDE"
    infoText: "We are offering a online programming environment perfectly fitting for your project, please log in to continue."
    loadingText: "Preparing your personal Online IDE..."
    footerLinks:
      attribution:
        text: "Built by TUM LS1 Team 👨‍💻"
        url: "https://aet.cit.tum.de/"
        version: "v1.0.0"
      bugReport:
        text: "Report a bug 🐛"
        url: "https://github.com/EduIDE/EduIDE/issues"
      featureRequest:
        text: "Request a feature ✨"
        url: "https://github.com/EduIDE/EduIDE/issues"
      about:
        text: "About"
        url: "https://aet.cit.tum.de/"

  keycloak:
    enable: true

    # -- Key cloak auth URL. Only has to be specified when enable: true
    authUrl: "https://keycloak.ase.in.tum.de/"

    # # -- The Keycloak Realm. Only has to be specified when enable: true
    realm: "tum"

    #     # -- The client-id. Only has to be specified when enable: true
    clientId: "theia"

theia-appdefinitions:
  defaultImageTag: latest-0c8eec9

monitoring:
  targetNamespaces:
    - theia
  sessionNamespaces:
    - theia
