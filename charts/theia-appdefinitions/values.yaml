# Global default image tag for all IDE images
# Used as fallback when individual apps don't specify their own imageTag
# Can be overridden via parent chart or --set
defaultImageTag: latest

# Scaling values in this file are bootstrap defaults for AppDefinitions.
# After first creation, future Helm deployments preserve live min/max values
# from existing AppDefinition resources and do not overwrite them.
apps:
  - name: java-17-latest
    image: ghcr.io/eduide/eduide/java-17
    # imageTag: latest  # Optional: override defaultImageTag for this app
    requestsMemory: 2000M
    requestsCpu: 500m
    limitsMemory: 3000M
    minInstances: 3
    maxInstances: 1000
    options:
      dataBridgeEnabled: "true"
      dataBridgePort: "16281"

  - name: c-latest
    image: ghcr.io/eduide/eduide/c
    # imageTag: latest  # Optional: override defaultImageTag for this app
    requestsMemory: 100M
    requestsCpu: 200m
    limitsMemory: 2400M
    minInstances: 0
    maxInstances: 1000
    options:
      dataBridgeEnabled: "true"
      dataBridgePort: "16281"

  - name: javascript-latest
