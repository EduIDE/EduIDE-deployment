{{- range .Values.apps }}
{{- $existingApp := lookup "theia.cloud/v1beta10" "AppDefinition" $.Release.Namespace .name }}
{{- $existingSpec := dict }}
{{- if $existingApp }}
  {{- $existingSpec = get $existingApp "spec" | default dict }}
{{- end }}
# min/max from values are only bootstrap defaults. Existing AppDefinition scaling values are preserved across future deployments.
{{- $minInstances := .minInstances | default 0 }}
{{- if hasKey $existingSpec "minInstances" }}
  {{- $minInstances = get $existingSpec "minInstances" }}
{{- end }}
{{- $maxInstances := .maxInstances | default 10 }}
{{- if hasKey $existingSpec "maxInstances" }}
  {{- $maxInstances = get $existingSpec "maxInstances" }}
{{- end }}
---
apiVersion: theia.cloud/v1beta10
kind: AppDefinition
metadata:
  name: {{ .name }}
  annotations:
    helm.sh/revision: {{ $.Release.Revision | quote }}
spec:
  name: {{ .name }}
  image: {{ .image | default "ghcr.io/eduide/eduide/default" }}:{{ .imageTag | default $.Values.defaultImageTag | default "latest" }}
  uid: {{ .uid | default 101 }}
  port: {{ .port | default 3000 }}
  ingressname: {{ .ingressname | default "theia-cloud-demo-ws-route" }}
  ingressHostnamePrefixes: 
    {{- if .ingressHostnamePrefixes }}
    {{- range .ingressHostnamePrefixes }}
    - {{ . | default "*.webview." }}
    {{- end }}
    {{- else }}
    - "*.webview."
    {{- end }}
  minInstances: {{ $minInstances }}
  maxInstances: {{ $maxInstances }}
  requestsMemory: {{ .requestsMemory | default "1000M" }}
  requestsCpu: {{ .requestsCpu | default "100m" }}
  limitsMemory: {{ .limitsMemory | default "1200M" }}
  limitsCpu: {{ .limitsCpu | default "2" | quote}}
  imagePullPolicy: {{ .imagePullPolicy | default "IfNotPresent" }}
  downlinkLimit: {{ .downlinkLimit | default 30000 }}
  uplinkLimit: {{ .uplinkLimit | default 30000 }}
  mountPath: {{ .mountPath | default "/home/project" }}
  timeout: {{ .timeout | default 1440 }}
  monitor:
    port: {{ (.monitor).port | default 3000 }}
    activityTracker:
      timeoutAfter: {{ ((.monitor).activityTracker).timeoutAfter | default 60 }}
      notifyAfter: {{ ((.monitor).activityTracker).notifyAfter | default 55 }}
  {{- if .options }}
  options:
    {{- toYaml .options | nindent 4 }}
  {{- end }}
{{- end }}
