{{- range .Values.apps }}
---
apiVersion: theia.cloud/v1beta11
kind: AppDefinition
metadata:
  name: {{ .name }}
  annotations:
    helm.sh/revision: {{ $.Release.Revision | quote }}
spec:
  name: {{ .name }}
  image: {{ .image | default "ghcr.io/ls1intum/theia/default" }}:{{ .imageTag | default $.Values.defaultImageTag | default "latest" }}
  uid: {{ .uid | default 101 }}
  port: {{ .port | default 3000 }}
  ingressname: {{ .ingressname | default "theia-cloud-demo-ws-route" }}
  ingressHostnamePrefixes: 
    {{- if .ingressHostnamePrefixes }}
    {{- range .ingressHostnamePrefixes }}
    - {{ . | default "*.webview." }}
    {{- end }}
    {{- else }}
    - "*.webview."
    {{- end }}
  minInstances: {{ .minInstances | default 0 }}
  maxInstances: {{ .maxInstances | default 10 }}
  requestsMemory: {{ .requestsMemory | default "1000M" }}
  requestsCpu: {{ .requestsCpu | default "100m" }}
  limitsMemory: {{ .limitsMemory | default "1200M" }}
  limitsCpu: {{ .limitsCpu | default "2" | quote}}
  imagePullPolicy: {{ .imagePullPolicy | default "IfNotPresent" }}
  downlinkLimit: {{ .downlinkLimit | default 30000 }}
  uplinkLimit: {{ .uplinkLimit | default 30000 }}
  mountPath: {{ .mountPath | default "/home/project" }}
  timeout: {{ .timeout | default 1440 }}
  monitor:
    port: {{ (.monitor).port | default 3000 }}
    activityTracker:
      timeoutAfter: {{ ((.monitor).activityTracker).timeoutAfter | default 60 }}
      notifyAfter: {{ ((.monitor).activityTracker).notifyAfter | default 55 }}
  {{- if .options }}
  options:
    {{- toYaml .options | nindent 4 }}
  {{- end }}
  {{- if .sidecars }}
  sidecars:
    {{- range .sidecars }}
    - name: {{ .name }}
      image: {{ .image }}
      port: {{ .port | default 5000 }}
      {{- if .languages }}
      languages:
        {{- range .languages }}
        - {{ . }}
        {{- end }}
      {{- end }}
      {{- if .cpuLimit }}
      cpuLimit: {{ .cpuLimit }}
      {{- end }}
      {{- if .memoryLimit }}
      memoryLimit: {{ .memoryLimit }}
      {{- end }}
      {{- if .cpuRequest }}
      cpuRequest: {{ .cpuRequest }}
      {{- end }}
      {{- if .memoryRequest }}
      memoryRequest: {{ .memoryRequest }}
      {{- end }}
      mountWorkspace: {{ .mountWorkspace | default true }}
    {{- end }}
  {{- end }}
{{- end }}
