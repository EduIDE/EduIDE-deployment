{{- if .Values.issuer.create }}
{{- if not .Values.issuer.name }}
{{- fail "issuer.name must be set when issuer.create=true" }}
{{- end }}
{{- if not .Values.issuer.acme.email }}
{{- fail "issuer.acme.email must be set when issuer.create=true" }}
{{- end }}
{{- if not .Values.issuer.acme.privateKeySecretName }}
{{- fail "issuer.acme.privateKeySecretName must be set when issuer.create=true" }}
{{- end }}
{{- $solvers := default (list) .Values.issuer.acme.solvers }}
{{- if not (kindIs "slice" $solvers) }}
{{- fail "issuer.acme.solvers must be a list when issuer.create=true" }}
{{- end }}
{{- if eq (len $solvers) 0 }}
{{- fail "issuer.acme.solvers must define at least one ACME solver when issuer.create=true" }}
{{- end }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.issuer.name }}
spec:
  acme:
    server: {{ .Values.issuer.acme.server | quote }}
    email: {{ .Values.issuer.acme.email | quote }}
    privateKeySecretRef:
      name: {{ .Values.issuer.acme.privateKeySecretName | quote }}
    solvers:
{{ toYaml $solvers | nindent 6 }}
{{- end }}
