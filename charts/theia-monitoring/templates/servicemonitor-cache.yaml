apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: theia-shared-cache
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: cache-server
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
