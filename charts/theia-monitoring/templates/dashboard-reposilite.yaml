              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": { "maxHeight": 600, "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "rate(jetty_requests_total{namespace=\"$namespace\"}[5m])",
              "instant": false,
              "legendFormat": "Requests/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
