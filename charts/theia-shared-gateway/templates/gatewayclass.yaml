{{- if .Values.gatewayClass.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.className }}
  {{- with .Values.gatewayClass.labels }}
  labels:
{{ toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.gatewayClass.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  controllerName: {{ .Values.gatewayClass.controllerName }}
  {{- with .Values.gatewayClass.parametersRef }}
  parametersRef:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
